<h2>My Subjects</h2>

<div style="margin-bottom: 20px; padding: 15px; background: #e3f2fd; border-radius: 8px;">
    <strong>Multi-Course Quiz Builder</strong><br>
    <small>Select courses or chapters below. Distribute Focus % to determine how often notes from each course appear. Must total exactly 100%.</small><br><br>

    <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
        <button onclick="startQuiz('hub')" style="background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Start Multi-Course Quiz
        </button>

        <select id="quiz-chapter-mode" style="padding: 9px; border-radius: 4px; border: 1px solid #ccc;">
            <option value="standard">Mode: Standard (Size Based)</option>
            <option value="equal">Mode: Equalize Chapters</option>
            <option value="forward">Mode: Focus New (Higher Ch. = Heavier)</option>
            <option value="reverse">Mode: Review Old (Lower Ch. = Heavier)</option>
        </select>

        <strong id="focus-total-display" style="color: red; font-size: 1.1em; margin-left: auto;">Total Focus: 0%</strong>
    </div>
</div>

<div style="margin-bottom: 20px;">
    <input type="text" id="new-course-name" placeholder="New Subject Name">
    <button onclick="addCourse()">Create Subject</button>
</div>

<div id="course-list"></div>

<template id="course-template">
    <div style="margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border: 1px solid #ddd;">
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="course-check" title="Select All Chapters" style="margin-right: 5px;">
                <strong class="course-name" style="margin-right: 15px;"></strong>
                <label style="font-size: 0.9em; background: #eee; padding: 4px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 5px;">
                    Focus: <input type="number" class="course-percentage" placeholder="0" min="0" max="100" style="width: 80px; text-align:center; padding: 4px; box-sizing: border-box;" oninput="updateTotalFocus()"> %
                </label>
            </div>
            <div>
                <button class="btn-expand" style="margin-right: 5px;">▼ Chapters</button>
                <button class="btn-open">Open</button>
                <button class="btn-rename">Rename</button>
                <button class="btn-reset-course" style="background: #ffc107; color: black; border: 1px solid #d39e00;">Reset</button>
                <button class="btn-delete" style="background: #ffcccc; color: #cc0000;">X</button>
            </div>
        </div>
        <div class="hub-chapters-container" style="display:none; padding: 10px 10px 10px 30px; border-left: 2px solid #ccc; background: #fff;"></div>
    </div>
</template>

<template id="hub-chapter-template">
    <div style="margin-bottom: 5px;">
        <label>
            <input type="checkbox" class="chap-select">
            <span class="chap-name"></span>
        </label>
    </div>
</template>
