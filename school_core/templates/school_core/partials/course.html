<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <div>
        <button onclick="router('hub')"><< Back</button>
        <h2 id="course-title" style="display: inline-block; margin-left: 10px; margin-bottom: 0;">Course Name</h2>
    </div>
    <button id="btn-top-reset-course" onclick="resetCourseWeights()" style="background: #ffc107; color: black; border: 1px solid #d39e00; padding: 5px 10px; cursor: pointer; border-radius: 4px; display: none; font-weight: bold;">⚠ Reset Entire Course</button>
</div>

<div style="border: 1px solid black; padding: 10px;">
    <h3>Add Chapter</h3>
    Name: <input type="text" id="new-chap-name" placeholder="Chapter Name"><br>
    Index: <input type="number" id="new-chap-index" value="1"><br>
    <button onclick="addChapter()">Add</button>
</div>

<h3>Quiz Builder</h3>
<div id="chapter-list"></div>
<br>
<button onclick="startQuiz('course')">Start Quiz</button>

<template id="chapter-row-template">
    <div style="padding: 5px; border-bottom: 1px solid #eee;">

        <div class="chap-view-mode" style="display: flex; align-items: center; flex-wrap: wrap; gap: 5px;">
            <label style="margin-right: 10px;">
                <input type="checkbox" class="chap-select">
                <span class="chap-label"></span>
            </label>
            <button class="btn-notes">Notes</button>
            <button class="btn-edit-chap" style="background: #cce5ff; color: #004085; border: 1px solid #b8daff; padding: 2px 6px; cursor: pointer;">Edit</button>
            <button class="btn-reset-chap" style="background: #ffc107; color: black; border: 1px solid #d39e00; padding: 2px 6px; cursor: pointer;">Reset Progress</button>
            <button class="btn-delete" style="background: #ffcccc; color: #cc0000; border: 1px solid #f5c6cb; padding: 2px 6px; cursor: pointer;">Delete</button>
        </div>

        <div class="chap-edit-mode" style="display: none; padding: 10px; background: #fff8e1; border: 1px solid #ffeeba; margin-top: 5px;">
            <label>Name: <input type="text" class="edit-chap-name"></label>
            <label style="margin-left: 10px;">Index: <input type="number" class="edit-chap-index" style="width: 60px;"></label>
            <button class="btn-save-chap" style="background: green; color: white; margin-left: 10px; cursor: pointer; padding: 2px 8px;">Save</button>
            <button class="btn-cancel-chap" style="cursor: pointer; padding: 2px 8px;">Cancel</button>
        </div>

    </div>
</template>
